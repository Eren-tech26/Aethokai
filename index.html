<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AethoKai — Next-Gen Anime Streaming</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        :root {
            --bg-deep: #050510;
            --purple-electric: #8B5CF6;
            --violet-neon: #A855F7;
            --lavender: #C084FC;
            --glow-color: rgba(139, 92, 246, 0.6);
        }

        body {
            background-color: var(--bg-deep);
            color: #FFFFFF;
            font-family: 'Outfit', sans-serif;
            overflow-x: hidden;
            scrollbar-width: thin;
            scrollbar-color: var(--purple-electric) var(--bg-deep);
        }

        /* Ambient Dynamic Background Engine */
        .nebula-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -2;
            background: radial-gradient(circle at 20% 30%, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(168, 85, 247, 0.15) 0%, transparent 50%);
            filter: blur(80px);
            animation: nebulaShift 20s ease-in-out infinite alternate;
        }

        @keyframes nebulaShift {
            0% { transform: scale(1) translate(0px, 0px); }
            100% { transform: scale(1.1) translate(30px, -30px); }
        }

        .particles {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -1;
            pointer-events: none;
            background-image: radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* Glassmorphism System */
        .glass-panel {
            background: rgba(10, 10, 25, 0.5);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .glass-nav {
            background: rgba(5, 5, 16, 0.65);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-bottom: 1px solid rgba(139, 92, 246, 0.15);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .glass-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: var(--purple-electric);
            box-shadow: 0 0 25px var(--glow-color);
        }

        /* Custom UI Accent Text & Elements */
        .text-neon {
            color: #FFFFFF;
            text-shadow: 0 0 10px var(--purple-electric), 0 0 20px var(--violet-neon);
        }

        .glow-button {
            transition: all 0.3s ease;
        }
        .glow-button:hover {
            box-shadow: 0 0 15px var(--purple-electric);
            transform: scale(1.03);
        }

        /* Hide Scrollbar tracks cleanly */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-deep); }
        ::-webkit-scrollbar-thumb { background: var(--purple-electric); border-radius: 10px; }
    </style>
</head>
<body class="pb-32">

    <div class="nebula-bg"></div>
    <div class="particles"></div>

    <header class="glass-nav fixed top-0 left-0 w-full z-50 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center space-x-2 cursor-pointer select-none" id="brand-logo">
            <span class="text-xs tracking-widest text-[#B8B8D0] font-['Space_Grotesk']">Code2Cure</span>
            <span class="text-xl font-['Orbitron'] tracking-wider text-white font-black pl-4">AETHO<span class="text-[#8B5CF6]">KAI</span></span>
            <span id="vip-badge" class="hidden ml-2 bg-gradient-to-r from-amber-400 to-purple-600 text-[10px] font-bold px-2 py-0.5 rounded-full text-black shadow-lg animate-pulse">VIP UNLOCKED</span>
        </div>
        
        <div class="hidden md:flex items-center space-x-6 text-sm font-medium tracking-wide">
            <button onclick="switchTab('home')" class="hover:text-[#8B5CF6] transition-colors">Home</button>
            <button onclick="switchTab('trending')" class="hover:text-[#8B5CF6] transition-colors">Trending</button>
            <button onclick="switchTab('airing')" class="hover:text-[#8B5CF6] transition-colors">Airing Schedule</button>
            <button onclick="switchTab('mylist')" class="hover:text-[#8B5CF6] transition-colors">My List</button>
        </div>

        <div class="flex items-center space-x-4">
            <div class="relative glass-card rounded-full px-4 py-1.5 flex items-center">
                <input type="text" id="global-search" placeholder="Search universe..." class="bg-transparent border-none text-xs text-white focus:outline-none w-40 placeholder-[#B8B8D0]">
                <button onclick="executeSearch()"><span class="text-[#8B5CF6] text-xs">🔎</span></button>
            </div>
            <div class="w-8 h-8 rounded-full border border-[#8B5CF6] overflow-hidden cursor-pointer" onclick="switchTab('profile')">
                <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=100&q=80" alt="Profile" class="w-full h-full object-cover">
            </div>
        </div>
    </header>

    <main id="app-viewport" class="pt-24 px-4 md:px-12 max-w-7xl mx-auto">
        </main>

    <div id="player-modal" class="fixed inset-0 z-50 hidden bg-black/90 backdrop-blur-md flex items-center justify-center p-4">
        <div class="glass-panel w-full max-w-5xl rounded-2xl overflow-hidden shadow-2xl flex flex-col h-[90vh]">
            <div class="p-4 flex justify-between items-center border-b border-white/10">
                <h3 id="player-title" class="font-['Space_Grotesk'] text-lg font-bold">Anime Screening Console</h3>
                <button onclick="closePlayer()" class="text-[#B8B8D0] hover:text-white text-xl font-bold">&times;</button>
            </div>
            <div class="flex-1 bg-black flex items-center justify-center relative">
                <iframe id="video-stream-frame" src="" class="w-full h-full" frameborder="0" scrolling="no" allowfullscreen></iframe>
            </div>
            <div class="p-4 glass-panel flex flex-wrap gap-4 items-center justify-between text-sm">
                <div class="flex items-center space-x-4">
                    <button id="prev-ep-btn" class="glow-button bg-white/10 px-4 py-2 rounded-lg">⏮ Previous</button>
                    <span id="player-ep-indicator" class="font-bold text-[#C084FC]">Episode --</span>
                    <button id="next-ep-btn" class="glow-button bg-[#8B5CF6] px-4 py-2 rounded-lg">Next ⏭</button>
                </div>
                <div class="flex items-center space-x-3">
                    <select id="server-selector" class="bg-black/50 border border-white/20 p-2 rounded text-white" onchange="changeServer(this.value)">
                        <option value="sub">Server 1 — Subbed Anime</option>
                        <option value="dub">Server 2 — Dubbed Anime</option>
                    </select>
                    <div class="flex items-center space-x-2">
                        <input type="checkbox" id="auto-next" checked class="accent-[#8B5CF6]">
                        <label for="auto-next" class="text-xs text-[#B8B8D0]">Auto Next</label>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Internal Normalized Structural In-Memory Mock Database Instance
        const ANIME_DB = [
            { id: "16498", title: "Attack on Titan: The Final Season", poster: "https://images.unsplash.com/photo-1578632767115-351597cf2477?auto=format&fit=crop&w=400&q=80", banner: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&w=1200&q=80", totalEpisodes: 28, sub: true, dub: true, rating: "9.1", genre: "Action", status: "Completed", desc: "The catastrophic final confrontation between humanity and the apocalyptic power of the Titans." },
            { id: "21511", title: "Cyberpunk: Edgerunners", poster: "https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&w=400&q=80", banner: "https://images.unsplash.com/photo-1607604276583-eef5d076aa5f?auto=format&fit=crop&w=1200&q=80", totalEpisodes: 10, sub: true, dub: true, rating: "8.6", genre: "Cyberpunk", status: "Completed", desc: "A street kid trying to survive in a technology and body modification-obsessed city of the future." },
            { id: "101922", title: "Demon Slayer: Kimetsu no Yaiba", poster: "https://images.unsplash.com/photo-1607604276583-eef5d076aa5f?auto=format&fit=crop&w=400&q=80", banner: "https://images.unsplash.com/photo-1534447677768-be436bb09401?auto=format&fit=crop&w=1200&q=80", totalEpisodes: 26, sub: true, dub: false, rating: "8.7", genre: "Fantasy", status: "Airing", desc: "Bloodthirsty demons lurk in the woods, and a young boy embarks on a dark quest to save his sister." },
            { id: "113415", title: "Jujutsu Kaisen", poster: "https://images.unsplash.com/photo-1563089145-599997674d42?auto=format&fit=crop&w=400&q=80", banner: "https://images.unsplash.com/photo-1518709268805-4e9042af9f23?auto=format&fit=crop&w=1200&q=80", totalEpisodes: 24, sub: true, dub: true, rating: "8.8", genre: "Action", status: "Airing", desc: "A boy swallows a cursed talisman to save a friend, inheriting a terrifying power within his own soul." }
        ];

        // Global Orchestration Application State Variable Layout
        let currentTab = 'home';
        let activeVideo = { id: '', ep: 1, type: 'sub' };
        let logoClicks = 0;
        let isVIP = false;
        let watchHistory = [];

        // Application Lifecyle Boot Controller Init
        window.addEventListener('DOMContentLoaded', () => {
            initAppCore();
            switchTab('home');
        });

        function initAppCore() {
            // Setup secret trigger system configuration on platform branding asset
            const logo = document.getElementById('brand-logo');
            logo.addEventListener('click', () => {
                logoClicks++;
                if (logoClicks >= 5) {
                    logoClicks = 0;
                    const pin = prompt("ACCESSING RECONSTRUCTION BUFFER. ENTER SECURITY MATRIX KEYCODE:");
                    if (pin === "2611") {
                        isVIP = true;
                        document.getElementById('vip-badge').classList.remove('hidden');
                        alert("WELCOME ARCHITECT. PREMIUM VIP PLATFORM ACCESS PRIVILEGES GRANTED.");
                    }
                }
            });
        }

        // State Machine Interface Route Switcher
        function switchTab(tabId) {
            currentTab = tabId;
            const viewport = document.getElementById('app-viewport');
            
            if (tabId === 'home') {
                viewport.innerHTML = generateHomeLayout();
            } else if (tabId === 'trending') {
                viewport.innerHTML = generateGridSection("🔥 Trending Chrono-Streams", ANIME_DB);
            } else if (tabId === 'airing') {
                viewport.innerHTML = generateAiringSchedule();
            } else if (tabId === 'mylist') {
                viewport.innerHTML = generateGridSection("❤️ Synchronized Queue", ANIME_DB.slice(0, 2));
            } else if (tabId === 'profile') {
                viewport.innerHTML = generateProfileSection();
            }
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        // Layout Rendering Structural Engine Modules
        function generateHomeLayout() {
            const hero = ANIME_DB[1]; // Highlight Edgerunners for thematic aesthetic consistency
            return `
                <section class="relative rounded-3xl overflow-hidden glass-panel h-[50vh] md:h-[65vh] mb-12 flex items-end">
                    <div class="absolute inset-0 z-0">
                        <img src="${hero.banner}" class="w-full h-full object-cover opacity-60">
                        <div class="absolute inset-0 bg-gradient-to-t from-[#050510] via-transparent to-transparent"></div>
                    </div>
                    <div class="relative z-10 p-6 md:p-12 max-w-2xl">
                        <span class="bg-[#8B5CF6] text-[10px] font-black uppercase tracking-widest px-3 py-1 rounded-full text-white mb-4 inline-block">CYBERPUNK NEBULA CRUISE</span>
                        <h1 class="text-4xl md:text-6xl font-extrabold font-['Orbitron'] tracking-tight mb-4 text-white">${hero.title}</h1>
                        <p class="text-sm text-[#B8B8D0] mb-6 line-clamp-3">${hero.desc}</p>
                        <div class="flex space-x-4">
                            <button onclick="launchPlayer('${hero.id}', 1, 'sub')" class="glow-button bg-white text-black font-bold px-6 py-3 rounded-xl flex items-center space-x-2 cursor-pointer">
                                <span>▶</span> <span>STREAM INTERFACES</span>
                            </button>
                            <button class="glass-card px-6 py-3 rounded-xl text-white font-semibold">+ QUEUE ARCHIVE</button>
                        </div>
                    </div>
                </section>

                ${generateHorizontalRow("⚡ CONTINUING TRANSMISSIONS", ANIME_DB.slice(0, 2), true)}
                ${generateHorizontalRow("🔥 TRENDING CHRONO-DATA", ANIME_DB)}
                ${generateHorizontalRow("🧬 SEASONAL EXPERIMENTAL DATASECTOR", ANIME_DB.reverse())}
            `;
        }

        function generateHorizontalRow(title, data, progress = false) {
            return `
                <div class="mb-10">
                    <h2 class="text-xl font-bold font-['Space_Grotesk'] tracking-wider mb-6 text-white flex items-center justify-between">
                        <span>${title}</span>
                        <span class="text-xs text-[#8B5CF6] cursor-pointer hover:underline">VIEW ALL Matrix</span>
                    </h2>
                    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-6">
                        ${data.map(anime => `
                            <div class="glass-card rounded-xl overflow-hidden relative group cursor-pointer" onclick="launchPlayer('${anime.id}', 1, 'sub')">
                                <div class="relative aspect-[3/4] overflow-hidden">
                                    <img src="${anime.poster}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110">
                                    <div class="absolute top-2 right-2 flex flex-col gap-1">
                                        <span class="bg-black/70 backdrop-blur-md text-[10px] font-bold text-white px-2 py-0.5 rounded border border-white/10">⭐ ${anime.rating}</span>
                                        <span class="bg-[#8B5CF6] text-[10px] font-bold text-white px-2 py-0.5 rounded self-end">SUB/DUB</span>
                                    </div>
                                    ${progress ? `
                                        <div class="absolute bottom-0 left-0 w-full bg-black/40 h-1.5">
                                            <div class="bg-gradient-to-r from-[#8B5CF6] to-[#C084FC] h-full" style="width: 65%"></div>
                                        </div>
                                    ` : ''}
                                </div>
                                <div class="p-3">
                                    <h4 class="font-bold text-sm truncate text-white group-hover:text-[#8B5CF6] transition-colors">${anime.title}</h4>
                                    <p class="text-[11px] text-[#B8B8D0] mt-1">${anime.genre} • EP ${anime.totalEpisodes}</p>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function generateGridSection(title, data) {
            return `
                <div class="pt-6">
                    <h1 class="text-3xl font-['Orbitron'] mb-8 text-neon">${title}</h1>
                    <div class="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-5 gap-6">
                        ${data.map(anime => `
                            <div class="glass-card rounded-xl overflow-hidden cursor-pointer" onclick="launchPlayer('${anime.id}', 1, 'sub')">
                                <div class="aspect-[3/4] bg-neutral-900 relative">
                                    <img src="${anime.poster}" class="w-full h-full object-cover">
                                </div>
                                <div class="p-3">
                                    <h4 class="font-bold text-sm truncate">${anime.title}</h4>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function generateAiringSchedule() {
            return `
                <div class="pt-6">
                    <h1 class="text-3xl font-['Orbitron'] mb-4 text-neon">📡 LIVE SCHEDULE MATRIX</h1>
                    <p class="text-[#B8B8D0] text-sm mb-8">Real-time simulation sync timelines grid broadcast sector maps.</p>
                    <div class="space-y-4">
                        <div class="glass-panel p-4 rounded-xl flex items-center justify-between">
                            <div>
                                <span class="text-[#8B5CF6] font-mono text-xs">22:30 JST (LIVE NEXT)</span>
                                <h3 class="font-bold text-md mt-1">Demon Slayer Season 5</h3>
                            </div>
                            <span class="bg-white/10 text-xs px-3 py-1 rounded-full">Simulcast Node Alpha</span>
                        </div>
                        <div class="glass-panel p-4 rounded-xl flex items-center justify-between opacity-60">
                            <div>
                                <span class="text-neutral-500 font-mono text-xs">18:00 JST (BROADCAST COMPLETE)</span>
                                <h3 class="font-bold text-md mt-1">Chrono Mechanics Grid-V</h3>
                            </div>
                            <span class="bg-emerald-500/20 text-emerald-400 text-xs px-3 py-1 rounded-full">Archived</span>
                        </div>
                    </div>
                </div>
            `;
        }

        function generateProfileSection() {
            return `
                <div class="glass-panel p-8 rounded-3xl max-w-xl mx-auto text-center">
                    <div class="w-24 h-24 rounded-full border-2 border-[#8B5CF6] mx-auto overflow-hidden mb-4">
                        <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=200&q=80" class="w-full h-full object-cover">
                    </div>
                    <h2 class="text-2xl font-bold font-['Space_Grotesk'] mb-2">User: Neuromancer_Alpha</h2>
                    <p class="text-xs text-[#8B5CF6] tracking-widest uppercase mb-6">Simulation Node Security Tier: ${isVIP ? 'VIP ARCHITECT' : 'Standard Node'}</p>
                    <div class="border-t border-white/10 pt-6 text-left space-y-4 text-sm">
                        <div class="flex justify-between"><span class="text-[#B8B8D0]">Sync Pipeline Connection</span><span class="text-emerald-400 font-mono">Operational</span></div>
                        <div class="flex justify-between"><span class="text-[#B8B8D0]">Subtitles Overlay Profile</span><span class="text-white">English (ASS Styling Embedded)</span></div>
                    </div>
                </div>
            `;
        }

        // Search Interface Execution Node Engine
        function executeSearch() {
            const query = document.getElementById('global-search').value.trim().toLowerCase();
            if(!query) return;
            const filtered = ANIME_DB.filter(a => a.title.toLowerCase().includes(query) || a.genre.toLowerCase().includes(query));
            document.getElementById('app-viewport').innerHTML = generateGridSection(`🔍 QUERY FILTRATION ANALYSIS: "${query}"`, filtered);
        }

        // Live Dynamic VidNest API Stream Rendering Engine Control Deck Matrix
        function launchPlayer(id, ep, type) {
            activeVideo = { id, ep, type };
            const anime = ANIME_DB.find(a => a.id === id) || { title: "Unidentified Dataset" };
            
            document.getElementById('player-title').innerText = `${anime.title} — Episode ${ep}`;
            document.getElementById('player-ep-indicator').innerText = `Episode ${ep}`;
            document.getElementById('server-selector').value = type;

            // Generate targeted embedded API validation route string
            const embedUrl = `https://vidnest.fun/animepahe/${id}/${ep}/${type}`;
            document.getElementById('video-stream-frame').src = embedUrl;

            // Compute routing controls configuration state bounds
            document.getElementById('prev-ep-btn').onclick = () => { if(ep > 1) launchPlayer(id, ep - 1, type); };
            document.getElementById('next-ep-btn').onclick = () => { launchPlayer(id, ep + 1, type); };

            document.getElementById('player-modal').classList.remove('hidden');
        }

        function changeServer(val) {
            launchPlayer(activeVideo.id, activeVideo.ep, val);
        }

        function closePlayer() {
            document.getElementById('player-modal').classList.add('hidden');
            document.getElementById('video-stream-frame').src = ""; // Flush memory pipeline context array buffer cache
        }
    </script>

    <div class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 w-[92%] max-w-md">
        <div class="glass-panel rounded-2xl p-2.5 flex justify-between items-center shadow-2xl border border-white/10">
            <button onclick="switchTab('home')" class="flex flex-col items-center flex-1 py-1 text-[#B8B8D0] hover:text-[#8B5CF6] transition-all">
                <span class="text-lg">🏠</span><span class="text-[10px] font-medium tracking-tight mt-0.5">Home</span>
            </button>
            <button onclick="switchTab('trending')" class="flex flex-col items-center flex-1 py-1 text-[#B8B8D0] hover:text-[#8B5CF6] transition-all">
                <span class="text-lg">🔥</span><span class="text-[10px] font-medium tracking-tight mt-0.5">Trending</span>
            </button>
            <button onclick="switchTab('airing')" class="flex flex-col items-center flex-1 py-1 text-[#B8B8D0] hover:text-[#8B5CF6] transition-all">
                <span class="text-lg">📺</span><span class="text-[10px] font-medium tracking-tight mt-0.5">Airing</span>
            </button>
            <button onclick="switchTab('mylist')" class="flex flex-col items-center flex-1 py-1 text-[#B8B8D0] hover:text-[#8B5CF6] transition-all">
                <span class="text-lg">❤️</span><span class="text-[10px] font-medium tracking-tight mt-0.5">My List</span>
            </button>
            <button onclick="switchTab('profile')" class="flex flex-col items-center flex-1 py-1 text-[#B8B8D0] hover:text-[#8B5CF6] transition-all">
                <span class="text-lg">👤</span><span class="text-[10px] font-medium tracking-tight mt-0.5">Profile</span>
            </button>
        </div>
    </div>

    <footer class="w-full text-center py-6 text-[10px] font-mono tracking-widest text-neutral-600 uppercase border-t border-white/5 mt-20">
        MINDSPARK IDEATHON | SYSTEM PLATFORM REVISION AETHO.2035
    </footer>

</body>
</html>
