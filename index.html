
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AethoKai - Premium Anime Streaming</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #0f0f1e 100%);
            color: #ffffff;
            overflow-x: hidden;
        }

        /* Glass Morphism */
        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
        }

        .glass-premium {
            background: rgba(20, 25, 50, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(168, 85, 247, 0.2);
            border-radius: 16px;
        }

        /* Purple Liquid Flow Animation */
        .liquid-flow {
            position: relative;
            height: 200px;
            overflow: hidden;
            background: linear-gradient(180deg, transparent 0%, rgba(168, 85, 247, 0.3) 50%, transparent 100%);
        }

        .liquid-wave {
            position: absolute;
            width: 200%;
            height: 100%;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 1200 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cdefs%3E%3ClinearGradient id='grad' x1='0%25' y1='0%25' x2='0%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:rgba(168,85,247,0.5);stop-opacity:1' /%3E%3Cstop offset='100%25' style='stop-color:rgba(168,85,247,0.1);stop-opacity:1' /%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath d='M0,150 Q300,100 600,150 T1200,150 L1200,400 L0,400 Z' fill='url(%23grad)'/%3E%3Cpath d='M0,180 Q300,120 600,180 T1200,180 L1200,400 L0,400 Z' fill='rgba(168,85,247,0.3)' style='animation: wave 8s infinite;'/%3E%3C/svg%3E") repeat-x;
            animation: flow 15s linear infinite;
        }

        @keyframes flow {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        @keyframes wave {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(20px); }
        }

        /* Gradient Text */
        .gradient-text {
            background: linear-gradient(135deg, #a855f7 0%, #ec4899 50%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Glow Effect */
        .glow {
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.4);
        }

        .glow-sm {
            box-shadow: 0 0 10px rgba(168, 85, 247, 0.3);
        }

        /* Scroll Animations */
        .scroll-container {
            scroll-behavior: smooth;
        }

        .anime-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            border-radius: 12px;
        }

        .anime-card:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 10px 30px rgba(168, 85, 247, 0.4);
        }

        .anime-card-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.8) 100%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 16px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .anime-card:hover .anime-card-overlay {
            opacity: 1;
        }

        /* Hero Slider */
        .hero-slider {
            position: relative;
            height: 500px;
            overflow: hidden;
            border-radius: 16px;
        }

        .hero-slide {
            position: absolute;
            width: 100%;
            height: 100%;
            transition: opacity 0.8s ease;
            opacity: 0;
        }

        .hero-slide.active {
            opacity: 1;
        }

        .hero-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(10, 14, 39, 0.7) 0%, rgba(168, 85, 247, 0.2) 100%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 40px;
            z-index: 10;
        }

        /* Button Styles */
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #a855f7 0%, #ec4899 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.6);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.4);
        }

        /* Modal */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            width: 90%;
            max-width: 1000px;
            max-height: 90vh;
            overflow-y: auto;
            border-radius: 20px;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Episode Drawer */
        .episode-drawer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 70vh;
            background: linear-gradient(180deg, rgba(20, 25, 50, 0.95) 0%, rgba(10, 14, 39, 0.98) 100%);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(168, 85, 247, 0.2);
            border-radius: 24px 24px 0 0;
            z-index: 40;
            animation: slideUpDrawer 0.3s ease;
            overflow-y: auto;
        }

        @keyframes slideUpDrawer {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        /* Player Container */
        .player-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 12px;
            background: #000;
        }

        .player-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 12px;
        }

        /* Welcome Page Animation */
        .welcome-logo {
            font-size: 72px;
            font-weight: 900;
            background: linear-gradient(135deg, #a855f7 0%, #ec4899 50%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(168, 85, 247, 0.5);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* Intro Animation */
        .intro-text {
            font-size: 48px;
            font-weight: 700;
            text-align: center;
            margin: 20px 0;
            animation: fadeInUp 1s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Category Pills */
        .category-pill {
            padding: 8px 16px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .category-pill.active {
            background: linear-gradient(135deg, #a855f7 0%, #ec4899 100%);
            border-color: transparent;
        }

        .category-pill:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hero-slider {
                height: 300px;
            }

            .hero-overlay {
                padding: 20px;
            }

            .intro-text {
                font-size: 32px;
            }

            .welcome-logo {
                font-size: 48px;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const AethoKai = () => {
            const [currentPage, setCurrentPage] = useState('welcome');

            const [filterCategory, setFilterCategory] = useState('All');
            const [showEpisodeDrawer, setShowEpisodeDrawer] = useState(false);
            const [myList, setMyList] = useState([]);
            const [favorites, setFavorites] = useState([]);
            const [subDubMode, setSubDubMode] = useState('sub');

            // Anime Database
            const animeData = [
                {

                {

                {

                }
            ];

            const filteredAnime = animeData.filter(anime => {
                const matchesSearch = anime.title.toLowerCase().includes(searchQuery.toLowerCase());
                const matchesCategory = filterCategory === 'All' || anime.genres.includes(filterCategory) || 
                    (filterCategory === 'Trending' && anime.trending) ||
                    (filterCategory === 'Top Rated' && anime.topRated) ||
                    (filterCategory === 'Airing' && anime.status === 'Airing');
                return matchesSearch && matchesCategory;
            });

            useEffect(() => {
                const timer = setInterval(() => {
                    setHeroSlide((prev) => (prev + 1) % animeData.length);
                }, 8000);
                return () => clearInterval(timer);
            }, []);

            const toggleMyList = (anime) => {
                setMyList(prev => 
                    prev.find(a => a.id === anime.id) 
                        ? prev.filter(a => a.id !== anime.id)
                        : [...prev, anime]
                );
            };

            const toggleFavorite = (anime) => {
                setFavorites(prev =>
                    prev.find(a => a.id === anime.id)
                        ? prev.filter(a => a.id !== anime.id)
                        : [...prev, anime]
                );
            };

            const playAnime = (anime) => {
                setSelectedAnime(anime);
                setPlayingEpisode(anime.currentEpisode);
            };

                            <div className="absolute inset-0 bg-[radial-gradient(circle_at_20%_50%,rgba(168,85,247,0.3)_0%,transparent_50%)]"></div>
                            <div className="absolute inset-0 bg-[radial-gradient(circle_at_80%_80%,rgba(236,72,153,0.3)_0%,transparent_50%)]"></div>
                        </div>
                        
                        <div className="z-10 text-center space-y-8 animate-pulse">

                                AethoKai
                            </div>
                            <div className="text-3xl font-bold text-white">
                                Discovering Stories
                            </div>
                            <div className="mt-20">
                                <div className="w-16 h-1 bg-gradient-to-r from-purple-600 to-pink-600 mx-auto rounded-full animate-pulse"></div>
                            </div>
                        </div>

                        <button
                            onClick={() => setCurrentPage('home')}
                            className="absolute bottom-10 btn btn-primary"
                        >
                            Continue
                        </button>
                    </div>
                );
            }

            // Main Home Page
            if (currentPage === 'home') {
                return (

                                            value={searchQuery}

                                            className="w-full px-4 py-2 pl-10 rounded-lg bg-rgba(255,255,255,0.1) border border-purple-500 border-opacity-30 text-white placeholder-gray-400 focus:outline-none focus:border-purple-500"

                                    </div>
                                </div>
                            </div>
                        </div>

                                    <button
                                        onClick={() => toggleMyList(animeData[heroSlide])}
                                        className="btn btn-secondary"
                                    >
                                        <span>+</span> {myList.find(a => a.id === animeData[heroSlide].id) ? 'In List' : 'Add to List'}

                                        onClick={() => toggleFavorite(animeData[heroSlide])}
                                        className="btn btn-secondary"
                                    >

                                    </button>
                                </div>
                            </div>

                                onClick={() => setHeroSlide((prev) => (prev - 1 + animeData.length) % animeData.length)}

                            >
                                <ChevronLeft size={24} />
                            </button>
                            <button
                                onClick={() => setHeroSlide((prev) => (prev + 1) % animeData.length)}
                                className="absolute right-4 top-1/2 -translate-y-1/2 z-20 p-3 rounded-full bg-white bg-opacity-20 hover:bg-opacity-40 transition"
                            >
                                <ChevronRight size={24} />
                            </button>
                        </div>

                        {/* Category Filter */}
                        <div className="max-w-7xl mx-auto px-6 mb-8 overflow-x-auto pb-2">
                            <div className="flex gap-3 min-w-max">
                                {['All', 'Action', 'Fantasy', 'Romance', 'Isekai', 'Comedy', 'Trending', 'Top Rated', 'Airing'].map(cat => (
                                    <button
                                        key={cat}
                                        onClick={() => setFilterCategory(cat)}
                                        className={`category-pill whitespace-nowrap ${filterCategory === cat ? 'active' : ''}`}

                        </div>

                                {filteredAnime.map(anime => (
                                    <div
                                        key={anime.id}
                                        onClick={() => playAnime(anime)}
                                        className="anime-card group"
                                    >
                                        <img src={anime.poster} alt={anime.title} className="w-full h-80 object-cover" />
                                        <div className="anime-card-overlay">
                                            <h3 className="font-bold text-lg mb-2 line-clamp-2">{anime.title}</h3>
                                            <div className="flex items-center gap-2 text-sm mb-3">
                                                <span className="text-yellow-400">⭐ {anime.rating}</span>
                                                <span className="text-purple-300">{anime.episodes} eps</span>
                                            </div>
                                            <button className="btn btn-primary w-full justify-center mb-2">
                                                ▶ Play
                                            </button>
                                            <div className="flex gap-2">
                                                <button
                                                    onClick={(e) => {
                                                        e.stopPropagation();
                                                        toggleMyList(anime);
                                                    }}
                                                    className="btn btn-secondary flex-1 justify-center"
                                                >
                                                    +
                                                </button>
                                                <button
                                                    onClick={(e) => {
                                                        e.stopPropagation();
                                                        toggleFavorite(anime);
                                                    }}
                                                    className={`btn flex-1 justify-center ${favorites.find(a => a.id === anime.id) ? 'btn-primary' : 'btn-secondary'}`}
                                                >
                                                    ❤️
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* My List Section */}
                        {myList.length > 0 && (
                            <div className="max-w-7xl mx-auto px-6 mb-12">
                                <h2 className="text-2xl font-bold mb-6">📋 My List</h2>
                                <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
                                    {myList.map(anime => (
                                        <div
                                            key={anime.id}
                                            onClick={() => playAnime(anime)}
                                            className="anime-card"
                                        >
                                            <img src={anime.poster} alt={anime.title} className="w-full h-80 object-cover" />
                                            <div className="anime-card-overlay">
                                                <h3 className="font-bold text-lg mb-2">{anime.title}</h3>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* Player Modal */}
                        {selectedAnime && (
                            <div className="modal" onClick={() => setSelectedAnime(null)}>
                                <div className="modal-content glass-premium p-6" onClick={(e) => e.stopPropagation()}>
                                    <div className="flex justify-between items-center mb-4">
                                        <h2 className="text-3xl font-bold">{selectedAnime.title}</h2>
                                        <button
                                            onClick={() => setSelectedAnime(null)}
                                            className="text-2xl font-bold hover:text-purple-400"
                                        >
                                            ✕
                                        </button>
                                    </div>

                                    {/* Player */}
                                    <div className="player-container mb-6">
                                        <iframe
                                            src={`https://vidnest.fun/animepahe/${selectedAnime.id}/${playingEpisode}/${subDubMode}`}
                                            frameBorder="0"
                                            scrolling="no"
                                            allowFullScreen
                                            title="Anime Player"
                                        ></iframe>
                                    </div>

                                    {/* Player Controls */}
                                    <div className="space-y-4">
                                        {/* Sub/Dub Toggle */}
                                        <div className="flex gap-4 items-center flex-wrap">
                                            <span className="font-bold">Audio:</span>
                                            {selectedAnime.subAvailable && (
                                                <button
                                                    onClick={() => setSubDubMode('sub')}
                                                    className={`btn ${subDubMode === 'sub' ? 'btn-primary' : 'btn-secondary'}`}
                                                >
                                                    Subbed
                                                </button>
                                            )}
                                            {selectedAnime.dubAvailable && (
                                                <button
                                                    onClick={() => setSubDubMode('dub')}
                                                    className={`btn ${subDubMode === 'dub' ? 'btn-primary' : 'btn-secondary'}`}
                                                >
                                                    Dubbed
                                                </button>
                                            )}
                                        </div>

                                        {/* Episode Navigation */}
                                        <div className="flex gap-4 items-center flex-wrap">
                                            <button
                                                onClick={() => setPlayingEpisode(Math.max(1, playingEpisode - 1))}
                                                className="btn btn-secondary"
                                                disabled={playingEpisode === 1}
                                            >
                                                ← Previous
                                            </button>
                                            <span className="font-bold">Episode {playingEpisode} / {selectedAnime.episodes}</span>
                                            <button
                                                onClick={() => setPlayingEpisode(Math.min(selectedAnime.episodes, playingEpisode + 1))}
                                                className="btn btn-secondary"
                                                disabled={playingEpisode === selectedAnime.episodes}
                                            >
                                                Next →
                                            </button>
                                            <button
                                                onClick={() => setShowEpisodeDrawer(true)}
                                                className="btn btn-secondary ml-auto"
                                            >
                                                📋 Episodes
                                            </button>
                                        </div>

                                        {/* Info */}
                                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4 pt-4 border-t border-purple-500 border-opacity-30">
                                            <div>
                                                <p className="text-sm text-gray-400">Rating</p>
                                                <p className="font-bold text-lg">⭐ {selectedAnime.rating}</p>
                                            </div>
                                            <div>
                                                <p className="text-sm text-gray-400">Episodes</p>
                                                <p className="font-bold text-lg">{selectedAnime.episodes}</p>
                                            </div>
                                            <div>
                                                <p className="text-sm text-gray-400">Status</p>
                                                <p className="font-bold text-lg">{selectedAnime.status}</p>
                                            </div>
                                            <div>
                                                <p className="text-sm text-gray-400">Genres</p>
                                                <p className="font-bold text-sm">{selectedAnime.genres.join(', ')}</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Episode Drawer */}
                        {showEpisodeDrawer && selectedAnime && (
                            <div
                                className="episode-drawer"
                                onClick={(e) => {
                                    if (e.target === e.currentTarget) setShowEpisodeDrawer(false);
                                }}
                            >
                                <div className="p-6">
                                    <div className="flex justify-between items-center mb-6">
                                        <h3 className="text-2xl font-bold">Episodes - {selectedAnime.title}</h3>
                                        <button
                                            onClick={() => setShowEpisodeDrawer(false)}
                                            className="text-2xl font-bold hover:text-purple-400"
                                        >
                                            ✕
                                        </button>
                                    </div>

                                    <div className="grid grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-3">
                                        {Array.from({ length: selectedAnime.episodes }, (_, i) => i + 1).map(ep => (
                                            <button
                                                key={ep}
                                                onClick={() => {
                                                    setPlayingEpisode(ep);
                                                    setShowEpisodeDrawer(false);
                                                }}
                                                className={`p-3 rounded-lg font-bold transition ${
                                                    playingEpisode === ep
                                                        ? 'bg-gradient-to-r from-purple-600 to-pink-600 text-white'
                                                        : 'bg-white bg-opacity-10 hover:bg-opacity-20 text-white'
                                                }`}
                                            >
                                                {ep}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Bottom Navigation */}
                        <div className="fixed bottom-0 left-0 right-0 glass-premium mx-3 mb-3 rounded-xl z-40">
                            <div className="max-w-7xl mx-auto px-6 py-3 flex justify-around">
                                <button className="flex flex-col items-center gap-1 text-purple-400 hover:text-white transition">
                                    <Home size={24} />
                                    <span className="text-xs">Home</span>
                                </button>
                                <button className="flex flex-col items-center gap-1 text-gray-400 hover:text-white transition">
                                    <Flame size={24} />
                                    <span className="text-xs">Trending</span>
                                </button>
                                <button className="flex flex-col items-center gap-1 text-gray-400 hover:text-white transition">
                                    <Tv size={24} />
                                    <span className="text-xs">Airing</span>
                                </button>
                                <button className="flex flex-col items-center gap-1 text-gray-400 hover:text-white transition">
                                    <Search size={24} />
                                    <span className="text-xs">Search</span>
                                </button>
                                <button className="flex flex-col items-center gap-1 text-gray-400 hover:text-white transition">
                                    <Heart size={24} />
                                    <span className="text-xs">Favorites</span>
                                </button>
                                <button className="flex flex-col items-center gap-1 text-gray-400 hover:text-white transition">
                                    <User size={24} />
                                    <span className="text-xs">Profile</span>
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }
        };

        ReactDOM.render(<AethoKai />, document.getElementById('root'));
    </script>
</body>
</html>
