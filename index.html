<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AethoKai - Premium Anime Streaming</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
        :root{
          --bg:#080810;--surface:#0f0f1a;--card:#14141f;--border:#1e1e2e;
          --accent:#e50914;--accent2:#ff2233;
          --gold:#f5a623;--text:#f0f0f5;--sub:#8888aa;--muted:#3a3a55;
          --blue:#60a5fa;--green:#22c55e;
          --font:'Inter',sans-serif;--nav:56px;--bnav:60px;
        }
        html,body{background:var(--bg);color:var(--text);font-family:var(--font);overflow-x:hidden;padding-bottom:var(--bnav)}
        ::-webkit-scrollbar{width:3px;height:3px}
        ::-webkit-scrollbar-thumb{background:var(--muted);border-radius:2px}
        img{display:block;user-select:none}
        a{color:inherit;text-decoration:none}
        button{font-family:var(--font);cursor:pointer;border:none;background:none;color:inherit}

        /* NAV */
        .nav{position:fixed;top:0;left:0;right:0;height:var(--nav);display:flex;align-items:center;justify-content:space-between;padding:0 4%;z-index:3000;background:linear-gradient(to bottom,rgba(8,8,16,.97),transparent);transition:background .3s}
        .nav.solid{background:rgba(8,8,16,.98);border-bottom:1px solid var(--border)}
        .logo{font-size:1.4rem;font-weight:900;letter-spacing:-1px;cursor:pointer;color:var(--accent);text-transform:uppercase}
        .nav-r{display:flex;gap:8px}
        .nav-icon{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.06);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.9rem;cursor:pointer;transition:.2s}
        .nav-icon:active{background:rgba(255,255,255,.14)}

        /* BOTTOM NAV */
        .bnav{position:fixed;bottom:0;left:0;right:0;height:var(--bnav);background:rgba(8,8,16,.98);border-top:1px solid var(--border);display:flex;z-index:3000;padding-bottom:env(safe-area-inset-bottom,0)}
        .bn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--muted);font-size:.5rem;font-weight:700;text-transform:uppercase;transition:.15s;cursor:pointer}
        .bn.on{color:var(--accent)}
        .bn-ic{font-size:1.15rem}

        /* PAGES */
        .pg{display:none;min-height:100vh;animation:fadeUp .2s ease}
        .pg.on{display:block}
        @keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

        /* HERO */
        .hero{position:relative;width:100%;height:82vw;min-height:380px;max-height:660px;overflow:hidden}
        .hslides{position:absolute;inset:0}
        .hslide{position:absolute;inset:0;opacity:0;transition:opacity 1.2s ease}
        .hslide.on{opacity:1;z-index:1}
        .hslide img{width:100%;height:100%;object-fit:cover;object-position:center 15%}
        .hero-grad{position:absolute;inset:0;z-index:2;pointer-events:none;background:linear-gradient(to right,rgba(8,8,16,.95) 0%,rgba(8,8,16,.5) 40%,transparent 100%),linear-gradient(to top,var(--bg) 0%,rgba(8,8,16,.7) 18%,transparent 55%),linear-gradient(to bottom,rgba(8,8,16,.55) 0%,transparent 18%)}
        .hero-body{position:absolute;bottom:11%;left:4%;right:4%;z-index:3;max-width:520px}
        .h-title{font-size:clamp(1.6rem,5.5vw,2.8rem);font-weight:900;line-height:1.03;letter-spacing:-.5px;margin-bottom:6px}
        .h-meta{display:flex;align-items:center;gap:7px;font-size:.74rem;font-weight:600;margin-bottom:8px;flex-wrap:wrap}
        .h-rat{color:var(--gold)}.h-yr{color:var(--sub)}
        .h-tag{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);padding:1px 7px;border-radius:3px;font-size:.6rem;color:var(--sub)}
        .h-desc{font-size:.79rem;color:#aaaac8;line-height:1.65;margin-bottom:14px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
        .h-btns{display:flex;gap:8px}
        .hbtn{display:flex;align-items:center;gap:6px;padding:10px 18px;border-radius:6px;font-size:.84rem;font-weight:800;transition:.15s;cursor:pointer}
        .hbtn-play{background:var(--accent);color:#fff;box-shadow:0 4px 18px rgba(229,9,20,.3)}
        .hbtn-play:active{transform:scale(.97)}
        .hbtn-info{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.17)}
        .hbtn-info:active{background:rgba(255,255,255,.2)}
        .hdots{position:absolute;bottom:4%;right:4%;z-index:4;display:flex;gap:5px}
        .hdot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.2);cursor:pointer;transition:.3s}
        .hdot.on{background:var(--accent);width:16px;border-radius:3px}

        /* ROWS */
        .rows{padding:4px 4% 10px}
        .row{margin-bottom:22px}
        .row-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
        .row-ttl{font-size:.84rem;font-weight:800;display:flex;align-items:center;gap:6px}
        .slider{display:flex;gap:8px;overflow-x:auto;padding:3px 2px 8px;scroll-snap-type:x mandatory}
        .slider::-webkit-scrollbar{display:none}

        /* CARDS */
        .pcard{min-width:96px;width:96px;flex-shrink:0;cursor:pointer;scroll-snap-align:start;position:relative;border-radius:7px;overflow:hidden}
        .pcard:active{transform:scale(.93)}
        .pcard-img{width:100%;aspect-ratio:2/3;object-fit:cover;background:var(--card)}
        .pcard-name{font-size:.58rem;font-weight:600;margin-top:4px;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .pcard-meta{font-size:.53rem;color:var(--muted);margin-top:1px}
        .pcard-new{position:absolute;top:5px;left:5px;background:var(--accent);color:#fff;font-size:.46rem;font-weight:900;padding:2px 5px;border-radius:3px}
        .wcard{min-width:190px;width:190px;flex-shrink:0;cursor:pointer;scroll-snap-align:start;border-radius:7px;overflow:hidden;position:relative}
        .wcard:active{transform:scale(.96)}
        .wcard-img{width:100%;aspect-ratio:16/9;object-fit:cover;background:var(--card)}
        .wcard-over{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.88) 0%,transparent 55%);display:flex;flex-direction:column;justify-content:flex-end;padding:8px}
        .wcard-title{font-size:.7rem;font-weight:700;line-height:1.2}

        /* PLAYER OVERLAY */
        .player-overlay{position:fixed;inset:0;background:rgba(4,4,12,.95);z-index:9000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
        .player-overlay.on{opacity:1;pointer-events:auto}
        .player-modal{width:100%;height:100%;display:flex;flex-direction:column}
        .player-header{display:flex;align-items:center;justify-content:space-between;padding:16px 4%;border-bottom:1px solid var(--border);background:rgba(8,8,16,.9)}
        .player-controls{display:flex;gap:10px;margin-top:10px}
        .player-controls select{padding:6px 10px;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:4px;font-size:.75rem}
        .close-btn{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;cursor:pointer}
        .player-body{flex:1;display:flex;align-items:center;justify-content:center}
        .player-iframe{width:100%;height:100%;border:none}

        /* SK */
        .sk{background:linear-gradient(90deg,var(--surface) 25%,var(--card) 50%,var(--surface) 75%);background-size:200% 100%;animation:sk 1.4s infinite;border-radius:7px}
        @keyframes sk{0%{background-position:200% 0}100%{background-position:-200% 0}}
        .sk-p{min-width:96px;width:96px;aspect-ratio:2/3;flex-shrink:0}
        .sk-w{min-width:190px;width:190px;aspect-ratio:16/9;flex-shrink:0}

        @media (max-width:768px){
            .h-title{font-size:1.8rem}
            .h-desc{display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical}
        }
    </style>
</head>
<body>

<!-- NAV -->
<div class="nav">
    <div class="logo">Aetho<span>Kai</span></div>
    <div class="nav-r">
        <div class="nav-icon" onclick="openSearch()">🔍</div>
        <div class="nav-icon" onclick="openFavorites()">❤️</div>
    </div>
</div>

<!-- HOME PAGE -->
<div id="homePg" class="pg on">
    <div style="padding-top:calc(var(--nav)+20px)">
        <!-- HERO -->
        <div class="hero">
            <div class="hslides" id="heroSlides"></div>
            <div class="hero-grad"></div>
            <div class="hero-body">
                <div class="h-title" id="heroTitle">Loading...</div>
                <div class="h-meta">
                    <span class="h-rat" id="heroRating">★8.5</span>
                    <span class="h-yr" id="heroYear">2024</span>
                    <span class="h-tag" id="heroStatus">AIRING</span>
                </div>
                <div class="h-desc" id="heroDesc">Loading description...</div>
                <div class="h-btns">
                    <div class="hbtn hbtn-play" onclick="playAnime(heroData.id, heroData.idMal)">Play Now</div>
                    <div class="hbtn hbtn-info" onclick="viewDetails(heroData.id)">Details</div>
                </div>
            </div>
            <div class="hdots" id="heroDots"></div>
        </div>

        <!-- SHELVES -->
        <div class="rows" id="shelvesContainer"></div>
    </div>
</div>

<!-- PLAYER -->
<div class="player-overlay" id="playerOverlay">
    <div class="player-modal">
        <div class="player-header">
            <span id="playerTitle">Player</span>
            <div style="display:flex;gap:10px">
                <div class="player-controls">
                    <select id="serverSelect" onchange="changeServer()">
                        <option value="vidnest">VidNest (Default)</option>
                        <option value="server5">Server 5</option>
                    </select>
                    <select id="epSelect" onchange="changeEpisode()">
                        <option>Select Episode</option>
                    </select>
                </div>
                <div class="close-btn" onclick="closePlayer()">✕</div>
            </div>
        </div>
        <div class="player-body">
            <iframe class="player-iframe" id="playerFrame" allowfullscreen></iframe>
        </div>
    </div>
</div>

<!-- BOTTOM NAV -->
<div class="bnav">
    <div class="bn on" onclick="goHome()"><div class="bn-ic">🏠</div><div>Home</div></div>
    <div class="bn" onclick="openSearch()"><div class="bn-ic">🔍</div><div>Search</div></div>
    <div class="bn" onclick="openTrending()"><div class="bn-ic">🔥</div><div>Trending</div></div>
    <div class="bn" onclick="openFavorites()"><div class="bn-ic">❤️</div><div>Favorites</div></div>
</div>

<script>
    // ===== STATE =====
    const APP = {
        heroList: [],
        heroIndex: 0,
        heroData: null,
        currentAnime: null,
        favorites: JSON.parse(localStorage.getItem('favorites')) || [],
        cache: {}
    };

    let heroData = null;

    // ===== ANILIST API =====
    async function fetchAniList(query) {
        try {
            const response = await fetch('https://graphql.anilist.co', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query })
            });
            const data = await response.json();
            return data.data;
        } catch(e) {
            console.error('AniList Error:', e);
            return null;
        }
    }

    // ===== FETCH TRENDING =====
    async function fetchTrending() {
        const query = `
            query {
                Page(perPage: 10) {
                    media(type: ANIME, sort: TRENDING_DESC, status: RELEASING) {
                        id
                        idMal
                        title { romaji english native }
                        coverImage { large }
                        bannerImage
                        description
                        averageScore
                        status
                        episodes
                        startDate { year }
                        genres
                    }
                }
            }
        `;
        const data = await fetchAniList(query);
        return data?.Page?.media || [];
    }

    // ===== FETCH BY GENRE =====
    async function fetchByGenre(genre) {
        const query = `
            query {
                Page(perPage: 12) {
                    media(type: ANIME, genre: "${genre}", sort: POPULARITY_DESC) {
                        id
                        idMal
                        title { romaji }
                        coverImage { large }
                        averageScore
                        episodes
                    }
                }
            }
        `;
        const data = await fetchAniList(query);
        return data?.Page?.media || [];
    }

    // ===== GENRES =====
    const GENRES = ['Action', 'Fantasy', 'Romance', 'Comedy', 'Drama', 'Sci-Fi', 'Supernatural', 'Isekai'];

    // ===== CARD HTML =====
    function cardHTML(anime) {
        return `
            <div class="pcard" onclick="playAnime(${anime.id}, ${anime.idMal})">
                <img class="pcard-img" src="${anime.coverImage.large}" alt="">
                <div class="pcard-name">${anime.title.romaji || anime.title.english || 'Unknown'}</div>
                <div class="pcard-meta">★${anime.averageScore || 0} · ${anime.episodes || '?'} ep</div>
            </div>
        `;
    }

    function wCardHTML(anime) {
        return `
            <div class="wcard" onclick="playAnime(${anime.id}, ${anime.idMal})">
                <img class="wcard-img" src="${anime.coverImage.large}" alt="">
                <div class="wcard-over">
                    <div class="wcard-title">${anime.title.romaji || anime.title.english || 'Unknown'}</div>
                    <div class="wcard-sub">★${anime.averageScore || 0}</div>
                </div>
            </div>
        `;
    }

    // ===== HERO SETUP =====
    async function setupHero() {
        APP.heroList = await fetchTrending();
        if (!APP.heroList.length) return;

        updateHero();
        renderHeroDots();
        setInterval(nextHero, 8000);
    }

    function updateHero() {
        const anime = APP.heroList[APP.heroIndex];
        if (!anime) return;

        heroData = anime;
        APP.heroData = anime;

        document.getElementById('heroTitle').textContent = anime.title.romaji || anime.title.english || 'Unknown';
        document.getElementById('heroRating').textContent = `★${anime.averageScore || 0}`;
        document.getElementById('heroYear').textContent = anime.startDate?.year || '2024';
        document.getElementById('heroStatus').textContent = anime.status;
        document.getElementById('heroDesc').textContent = anime.description?.replace(/<[^>]*>/g, '').slice(0, 150) || 'No description';

        const slides = document.getElementById('heroSlides');
        const banner = anime.bannerImage || anime.coverImage.large;
        slides.innerHTML = `
            <div class="hslide on">
                <img src="${banner}" alt="">
            </div>
        `;

        renderHeroDots();
    }

    function renderHeroDots() {
        const dots = document.getElementById('heroDots');
        dots.innerHTML = APP.heroList.slice(0, 5).map((_, i) => `
            <div class="hdot ${i === APP.heroIndex ? 'on' : ''}" onclick="goToHero(${i})"></div>
        `).join('');
    }

    function nextHero() {
        APP.heroIndex = (APP.heroIndex + 1) % APP.heroList.length;
        updateHero();
    }

    function goToHero(i) {
        APP.heroIndex = i;
        updateHero();
    }

    // ===== RENDER SHELVES =====
    async function renderShelves() {
        const container = document.getElementById('shelvesContainer');
        container.innerHTML = '';

        for (const genre of GENRES) {
            const anime = await fetchByGenre(genre);
            if (!anime.length) continue;

            const shelf = document.createElement('div');
            shelf.className = 'row';
            shelf.innerHTML = `
                <div class="row-hdr">
                    <div class="row-ttl">${genre}</div>
                </div>
                <div class="slider">
                    ${anime.map(a => cardHTML(a)).join('')}
                </div>
            `;
            container.appendChild(shelf);
        }
    }

    // ===== PLAYER =====
    function playAnime(anilistId, malId) {
        APP.currentAnime = { anilistId, malId };
        
        // Fetch episodes
        const query = `
            query {
                Media(id: ${anilistId}, type: ANIME) {
                    title { romaji }
                    episodes
                }
            }
        `;
        
        fetchAniList(query).then(data => {
            const anime = data?.Media;
            if (!anime) return;

            document.getElementById('playerTitle').textContent = anime.title.romaji;
            
            const epSelect = document.getElementById('epSelect');
            epSelect.innerHTML = '<option>Select Episode</option>';
            for (let i = 1; i <= (anime.episodes || 12); i++) {
                epSelect.innerHTML += `<option value="${i}">Episode ${i}</option>`;
            }

            loadPlayer(anilistId, malId, 1, 'vidnest');
        });

        document.getElementById('playerOverlay').classList.add('on');
    }

    function loadPlayer(anilistId, malId, episode, server) {
        let url;
        
        if (server === 'vidnest') {
            url = `https://vidnest.fun/animepahe/${anilistId}/${episode}/sub`;
        } else if (server === 'server5') {
            url = `https://server5.anicdn.com/anime/${malId}/episode/${episode}`;
        }

        document.getElementById('playerFrame').src = url;
    }

    function changeServer() {
        const server = document.getElementById('serverSelect').value;
        const ep = document.getElementById('epSelect').value || 1;
        if (APP.currentAnime) {
            loadPlayer(APP.currentAnime.anilistId, APP.currentAnime.malId, ep, server);
        }
    }

    function changeEpisode() {
        const ep = document.getElementById('epSelect').value;
        if (!ep) return;
        const server = document.getElementById('serverSelect').value;
        if (APP.currentAnime) {
            loadPlayer(APP.currentAnime.anilistId, APP.currentAnime.malId, ep, server);
        }
    }

    function closePlayer() {
        document.getElementById('playerOverlay').classList.remove('on');
        document.getElementById('playerFrame').src = '';
    }

    function viewDetails(anilistId) {
        alert(`Details for anime ${anilistId} - Coming soon!`);
    }

    // ===== NAV =====
    function goHome() {
        document.querySelectorAll('.pg').forEach(p => p.classList.remove('on'));
        document.getElementById('homePg').classList.add('on');
        document.querySelectorAll('.bn').forEach(b => b.classList.remove('on'));
        event.target.closest('.bn').classList.add('on');
    }

    function openSearch() {
        alert('Search Coming Soon!');
    }

    function openTrending() {
        alert('Trending Page Coming Soon!');
    }

    function openFavorites() {
        alert('Favorites: ' + APP.favorites.length + ' items');
    }

    // ===== INIT =====
    window.addEventListener('load', () => {
        setupHero();
        renderShelves();
    });

    // Handle nav scroll
    window.addEventListener('scroll', () => {
        const nav = document.querySelector('.nav');
        if (window.scrollY > 50) {
            nav.classList.add('solid');
        } else {
            nav.classList.remove('solid');
        }
    });
</script>

</body>
</html>
