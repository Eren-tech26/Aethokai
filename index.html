<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AethoKai - Premium Anime Streaming</title>
    <style>
        /* ==================== RESET ==================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: #000000;
            color: #FFFFFF;
            line-height: 1.6;
        }

        /* ==================== VARIABLES ==================== */
        :root {
            --black-0: #000000;
            --black-1: #050505;
            --black-2: #0D0D0D;
            --black-3: #111111;
            --black-4: #1A1A1A;
            --black-5: #222222;
            --grey-1: #333333;
            --grey-2: #666666;
            --grey-3: #AAAAAA;
            --grey-4: #DDDDDD;
            --white: #FFFFFF;
        }

        /* ==================== TYPOGRAPHY ==================== */
        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            line-height: 1.1;
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.01em;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        h3 {
            font-size: 1.1rem;
            font-weight: 600;
        }

        p {
            font-size: 0.95rem;
            color: #AAAAAA;
            line-height: 1.7;
        }

        /* ==================== LAYOUT ==================== */
        .container {
            width: 100%;
            max-width: 1920px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        /* ==================== GLASS MORPHISM ==================== */
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
        }

        /* ==================== BUTTONS ==================== */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-primary {
            background: #FFFFFF;
            color: #000000;
        }

        .btn-primary:hover {
            background: #DDDDDD;
            transform: translateY(-2px);
            box-shadow: 0 20px 40px rgba(255, 255, 255, 0.1);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #FFFFFF;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .btn-sm {
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
        }

        /* ==================== HEADER ==================== */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.95) 0%, rgba(0, 0, 0, 0) 100%);
            backdrop-filter: blur(10px);
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .header-content {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 2rem;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            color: #FFFFFF;
            flex-shrink: 0;
        }

        .search-bar {
            flex: 1;
            max-width: 400px;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            color: #FFFFFF;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        .search-input::placeholder {
            color: #666666;
        }

        .search-icon {
            position: absolute;
            left: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            color: #666666;
            font-size: 1rem;
        }

        .header-actions {
            display: flex;
            gap: 1rem;
            flex-shrink: 0;
        }

        /* ==================== HERO BANNER ==================== */
        .hero-section {
            width: 100%;
            height: 100vh;
            position: relative;
            overflow: hidden;
            margin-top: 70px;
            display: flex;
            align-items: flex-end;
            justify-content: flex-start;
        }

        .hero-background {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #1A1A1A 0%, #0D0D0D 100%);
            z-index: 1;
        }

        .hero-image {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-size: cover;
            background-position: center;
            animation: zoomIn 20s ease-in-out infinite alternate;
            z-index: 2;
            opacity: 0.6;
        }

        @keyframes zoomIn {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, rgba(0, 0, 0, 0.9) 0%, transparent 50%, rgba(0, 0, 0, 0.9) 100%),
                        linear-gradient(180deg, transparent 0%, rgba(0, 0, 0, 0.9) 100%);
            z-index: 3;
        }

        .hero-content {
            position: relative;
            z-index: 4;
            max-width: 600px;
            margin-bottom: 100px;
            animation: fadeInUp 1s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero-content h1 {
            margin-bottom: 1rem;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        .hero-meta {
            display: flex;
            gap: 2rem;
            margin: 1.5rem 0 2rem 0;
            font-size: 0.95rem;
            flex-wrap: wrap;
        }

        .hero-meta-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .hero-meta-label {
            color: #AAAAAA;
            font-weight: 600;
        }

        .hero-meta-value {
            color: #FFFFFF;
        }

        .hero-content p {
            font-size: 1rem;
            color: #DDDDDD;
            margin-bottom: 2rem;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
            line-height: 1.8;
        }

        .hero-buttons {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .hero-buttons .btn {
            padding: 1rem 2rem;
            font-size: 1rem;
        }

        /* ==================== SHELF SECTION ==================== */
        .shelf-section {
            margin-top: -100px;
            position: relative;
            z-index: 5;
            padding: 4rem 0;
        }

        .shelf {
            margin-bottom: 4rem;
        }

        .shelf-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #FFFFFF;
        }

        .shelf-container {
            display: flex;
            gap: 1.5rem;
            overflow-x: auto;
            scroll-behavior: smooth;
            padding: 1rem 0;
            scrollbar-width: none;
        }

        .shelf-container::-webkit-scrollbar {
            display: none;
        }

        .anime-card {
            flex: 0 0 200px;
            position: relative;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            group;
        }

        .anime-card:hover {
            transform: translateY(-10px);
        }

        .anime-card-image {
            width: 100%;
            aspect-ratio: 2/3;
            background: #1A1A1A;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .anime-card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .anime-card:hover .anime-card-image img {
            transform: scale(1.05);
        }

        .anime-card-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(180deg, rgba(0, 0, 0, 0) 0%, rgba(0, 0, 0, 0.9) 100%);
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: flex-end;
            padding: 1rem;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .anime-card:hover .anime-card-overlay {
            opacity: 1;
        }

        .anime-card-title {
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #FFFFFF;
        }

        .anime-card-meta {
            font-size: 0.8rem;
            color: #AAAAAA;
            margin-bottom: 0.75rem;
        }

        .anime-card-actions {
            display: flex;
            gap: 0.5rem;
            width: 100%;
        }

        .anime-card-actions .btn {
            flex: 1;
            padding: 0.5rem;
            font-size: 0.8rem;
        }

        /* ==================== SEARCH PAGE ==================== */
        .search-page {
            padding-top: 150px;
            min-height: 100vh;
        }

        .search-container {
            margin-bottom: 3rem;
        }

        .search-input-large {
            width: 100%;
            padding: 1.25rem 2rem;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            color: #FFFFFF;
            font-size: 1.1rem;
            margin-bottom: 2rem;
            transition: all 0.3s ease;
        }

        .search-input-large:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.15);
        }

        .filter-section {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 0.6rem 1.2rem;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            color: #AAAAAA;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: rgba(255, 255, 255, 0.15);
            color: #FFFFFF;
            border-color: rgba(255, 255, 255, 0.3);
        }

        .search-results {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 2rem;
            margin-bottom: 4rem;
        }

        /* ==================== ANIME DETAILS PAGE ==================== */
        .anime-details {
            padding-top: 70px;
        }

        .details-banner {
            width: 100%;
            height: 400px;
            position: relative;
            overflow: hidden;
            border-radius: 16px;
            margin-bottom: 3rem;
        }

        .details-banner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .details-banner-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, rgba(0, 0, 0, 0.8) 0%, transparent 50%);
        }

        .details-header {
            display: grid;
            grid-template-columns: 200px 1fr;
            gap: 3rem;
            margin-bottom: 4rem;
            align-items: start;
        }

        .details-poster {
            width: 200px;
            aspect-ratio: 2/3;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .details-poster img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .details-info h1 {
            margin-bottom: 0.5rem;
            font-size: 2.5rem;
        }

        .details-info-meta {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 2rem;
            margin: 2rem 0;
            font-size: 0.95rem;
        }

        .meta-item {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .meta-label {
            color: #AAAAAA;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
        }

        .meta-value {
            color: #FFFFFF;
            font-weight: 600;
            font-size: 1.1rem;
        }

        .details-description {
            line-height: 1.8;
            color: #DDDDDD;
            max-width: 800px;
            margin-bottom: 2rem;
            font-size: 1rem;
        }

        .details-buttons {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 3rem;
        }

        .genres-list {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-top: 1.5rem;
        }

        .genre-badge {
            padding: 0.6rem 1.2rem;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            font-size: 0.9rem;
            color: #AAAAAA;
        }

        /* ==================== VIDEO PLAYER ==================== */
        .player-container {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000000;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            margin-bottom: 3rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .player-iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .player-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(180deg, rgba(0, 0, 0, 0) 0%, rgba(0, 0, 0, 0.9) 100%);
            padding: 2rem 1.5rem 1.5rem;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 10;
        }

        .player-container:hover .player-controls {
            opacity: 1;
        }

        .controls-row {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .control-label {
            color: #AAAAAA;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
        }

        .control-select {
            padding: 0.5rem 0.75rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            color: #FFFFFF;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .control-select:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .episode-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 1rem;
            margin-top: 2rem;
        }

        .episode-item {
            padding: 0.75rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .episode-item:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .episode-item.active {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.3);
            color: #FFFFFF;
        }

        /* ==================== MY LIST PAGE ==================== */
        .list-container {
            padding-top: 150px;
        }

        .list-tabs {
            display: flex;
            gap: 2rem;
            margin-bottom: 3rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 1rem;
        }

        .list-tab {
            padding: 0.75rem 1.5rem;
            background: none;
            border: none;
            color: #AAAAAA;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.3s ease;
            position: relative;
        }

        .list-tab:hover {
            color: #FFFFFF;
        }

        .list-tab.active {
            color: #FFFFFF;
        }

        .list-tab.active::after {
            content: '';
            position: absolute;
            bottom: -1rem;
            left: 0;
            right: 0;
            height: 2px;
            background: #FFFFFF;
        }

        .list-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 2rem;
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 4rem 2rem;
            color: #AAAAAA;
        }

        .empty-state h3 {
            font-size: 1.3rem;
            margin-bottom: 1rem;
            color: #FFFFFF;
        }

        /* ==================== BOTTOM NAVIGATION ==================== */
        .bottom-nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            z-index: 999;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .nav-item {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            color: #AAAAAA;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .nav-item:hover,
        .nav-item.active {
            background: rgba(255, 255, 255, 0.1);
            color: #FFFFFF;
            transform: scale(1.1);
        }

        /* ==================== LOADING ==================== */
        .skeleton {
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.1) 50%, rgba(255, 255, 255, 0.05) 100%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* ==================== RESPONSIVENESS ==================== */
        @media (max-width: 1024px) {
            h1 {
                font-size: 2.5rem;
            }

            .container {
                padding: 0 1.5rem;
            }

            .hero-content h1 {
                font-size: 2rem;
            }

            .search-bar {
                max-width: 250px;
            }

            .details-header {
                grid-template-columns: 1fr;
            }

            .details-poster {
                width: 150px;
                margin: 0 auto;
            }

            .search-results {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }
        }

        @media (max-width: 768px) {
            header {
                height: 60px;
            }

            .search-bar {
                display: none;
            }

            .logo {
                font-size: 1.4rem;
            }

            h1 {
                font-size: 2rem;
            }

            .hero-section {
                height: 500px;
                margin-top: 60px;
            }

            .hero-content {
                margin-bottom: 50px;
            }

            .hero-content h1 {
                font-size: 1.5rem;
            }

            .hero-content p {
                font-size: 0.95rem;
            }

            .hero-buttons {
                gap: 0.5rem;
            }

            .hero-buttons .btn {
                padding: 0.75rem 1.25rem;
                font-size: 0.9rem;
            }

            .anime-card {
                flex: 0 0 150px;
            }

            .bottom-nav {
                bottom: 10px;
                gap: 0.25rem;
                padding: 0.75rem;
            }

            .nav-item {
                width: 45px;
                height: 45px;
                font-size: 1.1rem;
            }

            .search-page {
                padding-top: 120px;
            }

            .search-results {
                grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
                gap: 1rem;
            }

            .details-banner {
                height: 250px;
                margin-bottom: 2rem;
            }

            .details-info-meta {
                gap: 1rem;
                font-size: 0.85rem;
            }

            .player-container {
                margin-bottom: 2rem;
            }

            .list-tabs {
                gap: 1rem;
                overflow-x: auto;
            }

            .list-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }
        }

        @media (max-width: 480px) {
            body {
                font-size: 14px;
            }

            header {
                height: 55px;
            }

            .logo {
                font-size: 1.2rem;
            }

            h1 {
                font-size: 1.5rem;
            }

            h2 {
                font-size: 1.1rem;
            }

            .hero-section {
                height: 400px;
                margin-top: 55px;
            }

            .hero-content {
                margin-bottom: 30px;
            }

            .hero-content h1 {
                font-size: 1.3rem;
            }

            .hero-buttons .btn {
                padding: 0.6rem 1rem;
                font-size: 0.8rem;
            }

            .shelf-title {
                font-size: 1.1rem;
            }

            .anime-card {
                flex: 0 0 120px;
            }

            .bottom-nav {
                width: calc(100% - 20px);
                bottom: 10px;
                left: 10px;
                transform: none;
            }

            .nav-item {
                width: 40px;
                height: 40px;
                font-size: 0.9rem;
            }

            .search-results {
                grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
                gap: 0.75rem;
            }

            .details-banner {
                height: 200px;
                margin-bottom: 1.5rem;
            }

            .details-header {
                gap: 1rem;
                margin-bottom: 2rem;
            }

            .details-info h1 {
                font-size: 1.5rem;
            }

            .details-buttons {
                gap: 0.5rem;
            }

            .details-buttons .btn {
                padding: 0.6rem 1rem;
                font-size: 0.8rem;
            }

            .list-grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            }

            .filter-section {
                overflow-x: auto;
            }
        }

        /* ==================== SCROLLBAR ==================== */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0D0D0D;
        }

        ::-webkit-scrollbar-thumb {
            background: #333333;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #666666;
        }
    </style>
</head>
<body>

<!-- ==================== HEADER ==================== -->
<header>
    <div class="container">
        <div class="header-content">
            <div class="logo">AethoKai</div>
            
            <div class="search-bar">
                <span class="search-icon">🔍</span>
                <input 
                    type="text" 
                    class="search-input" 
                    placeholder="Search anime..."
                    id="headerSearch"
                >
            </div>

            <div class="header-actions">
                <button class="btn btn-secondary btn-sm" onclick="navigatePage('list')">My List</button>
                <button class="btn btn-secondary btn-sm" onclick="navigatePage('profile')">Profile</button>
            </div>
        </div>
    </div>
</header>

<!-- ==================== HOME PAGE ==================== -->
<div id="homePage" class="page-content">
    <section class="hero-section">
        <div class="hero-background"></div>
        <div class="hero-image" id="heroImage"></div>
        <div class="hero-overlay"></div>

        <div class="container">
            <div class="hero-content">
                <h1 id="heroTitle">Loading...</h1>
                
                <div class="hero-meta">
                    <div class="hero-meta-item">
                        <span class="hero-meta-label">Score:</span>
                        <span class="hero-meta-value" id="heroScore">—</span>
                    </div>
                    <div class="hero-meta-item">
                        <span class="hero-meta-label">Episodes:</span>
                        <span class="hero-meta-value" id="heroEpisodes">—</span>
                    </div>
                    <div class="hero-meta-item">
                        <span class="hero-meta-label">Status:</span>
                        <span class="hero-meta-value" id="heroStatus">—</span>
                    </div>
                    <div class="hero-meta-item">
                        <span class="hero-meta-label">Studio:</span>
                        <span class="hero-meta-value" id="heroStudio">—</span>
                    </div>
                </div>

                <p id="heroDesc">Loading anime description...</p>
                
                <div class="hero-buttons">
                    <button class="btn btn-primary" onclick="playCurrentAnime()">Play Now</button>
                    <button class="btn btn-secondary" onclick="addToMyList()">Add to List</button>
                    <button class="btn btn-secondary btn-sm" onclick="viewCurrentDetails()">Details</button>
                </div>
            </div>
        </div>
    </section>

    <section class="shelf-section">
        <div class="container">
            <div id="shelvesContainer"></div>
        </div>
    </section>
</div>

<!-- ==================== SEARCH PAGE ==================== -->
<div id="searchPage" class="page-content" style="display: none;">
    <div class="search-page">
        <div class="container">
            <div class="search-container">
                <input 
                    type="text" 
                    class="search-input-large" 
                    placeholder="Search anime..." 
                    id="searchInput"
                >

                <div class="filter-section">
                    <button class="filter-btn active" data-filter="all" onclick="filterSearch('all')">All</button>
                    <button class="filter-btn" data-filter="airing" onclick="filterSearch('airing')">Airing</button>
                    <button class="filter-btn" data-filter="action" onclick="filterSearch('action')">Action</button>
                    <button class="filter-btn" data-filter="fantasy" onclick="filterSearch('fantasy')">Fantasy</button>
                    <button class="filter-btn" data-filter="romance" onclick="filterSearch('romance')">Romance</button>
                    <button class="filter-btn" data-filter="comedy" onclick="filterSearch('comedy')">Comedy</button>
                </div>
            </div>

            <h2>Search Results</h2>
            <div class="search-results" id="searchResults"></div>
        </div>
    </div>
</div>

<!-- ==================== ANIME DETAILS PAGE ==================== -->
<div id="detailsPage" class="page-content" style="display: none;">
    <div class="anime-details">
        <div class="container">
            <div class="details-banner">
                <img id="detailsBanner" src="" alt="Banner">
                <div class="details-banner-overlay"></div>
            </div>

            <div class="details-header">
                <div>
                    <img id="detailsPoster" class="details-poster" src="" alt="Poster">
                </div>

                <div class="details-info">
                    <h1 id="detailsTitle">Anime Title</h1>
                    <p id="detailsNativeTitle" style="color: #666666; margin-bottom: 1rem;"></p>

                    <div class="details-info-meta">
                        <div class="meta-item">
                            <span class="meta-label">Score</span>
                            <span class="meta-value" id="detailsScore">—</span>
                        </div>
                        <div class="meta-item">
                            <span class="meta-label">Episodes</span>
                            <span class="meta-value" id="detailsEpisodes">—</span>
                        </div>
                        <div class="meta-item">
                            <span class="meta-label">Status</span>
                            <span class="meta-value" id="detailsStatus">—</span>
                        </div>
                        <div class="meta-item">
                            <span class="meta-label">Year</span>
                            <span class="meta-value" id="detailsYear">—</span>
                        </div>
                    </div>

                    <p class="details-description" id="detailsDesc"></p>

                    <div class="details-buttons">
                        <button class="btn btn-primary" onclick="playSelectedAnime()">Play Now</button>
                        <button class="btn btn-secondary" onclick="addSelectedToList()">Add to List</button>
                        <button class="btn btn-secondary">Favorite</button>
                        <button class="btn btn-secondary">Share</button>
                    </div>

                    <div>
                        <h3>Genres</h3>
                        <div class="genres-list" id="genresList"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- ==================== VIDEO PLAYER PAGE ==================== -->
<div id="playerPage" class="page-content" style="display: none;">
    <div style="padding-top: 70px;">
        <div class="container">
            <div class="player-container">
                <iframe 
                    class="player-iframe"
                    id="videoPlayer"
                    src="about:blank"
                    allowfullscreen
                    allow="autoplay"
                ></iframe>
                <div class="player-controls">
                    <div class="controls-row">
                        <div class="control-group">
                            <label class="control-label">Episode</label>
                            <select class="control-select" id="episodeSelect" onchange="changeEpisode()">
                                <option>Select Episode</option>
                            </select>
                        </div>

                        <div class="control-group">
                            <label class="control-label">Quality</label>
                            <select class="control-select">
                                <option>Auto</option>
                                <option>1080p</option>
                                <option>720p</option>
                                <option>480p</option>
                            </select>
                        </div>

                        <div class="control-group">
                            <label class="control-label">Server</label>
                            <select class="control-select" id="serverSelect" onchange="changeServer()">
                                <option value="sub">Subbed</option>
                                <option value="dub">Dubbed</option>
                            </select>
                        </div>

                        <div class="control-group">
                            <button class="btn btn-secondary btn-sm" onclick="previousEpisode()">Previous</button>
                            <button class="btn btn-secondary btn-sm" onclick="nextEpisode()">Next</button>
                        </div>
                    </div>
                </div>
            </div>

            <div style="margin-top: 3rem;">
                <h2 id="playerAnimeTitle">Anime Title</h2>
                <p id="playerEpisodeDesc"></p>

                <div style="margin-top: 2rem;">
                    <h3>Episodes</h3>
                    <div class="episode-grid" id="episodeGrid"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- ==================== MY LIST PAGE ==================== -->
<div id="listPage" class="page-content" style="display: none;">
    <div class="list-container">
        <div class="container">
            <h1 style="margin-bottom: 2rem;">My List</h1>
            
            <div class="list-tabs">
                <button class="list-tab active" onclick="switchListTab('watching')">Watching</button>
                <button class="list-tab" onclick="switchListTab('completed')">Completed</button>
                <button class="list-tab" onclick="switchListTab('planning')">Planning</button>
                <button class="list-tab" onclick="switchListTab('dropped')">Dropped</button>
            </div>

            <div class="list-grid" id="listGrid">
                <div class="empty-state">
                    <h3>Your list is empty</h3>
                    <p>Add anime to get started</p>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- ==================== BOTTOM NAVIGATION ==================== -->
<nav class="bottom-nav">
    <div class="nav-item active" onclick="navigatePage('home')" title="Home">Home</div>
    <div class="nav-item" onclick="navigatePage('search')" title="Search">Search</div>
    <div class="nav-item" onclick="navigatePage('list')" title="My List">List</div>
    <div class="nav-item" onclick="navigatePage('profile')" title="Profile">Profile</div>
</nav>

<script>
    // ==================== STATE ==================== 
    const APP = {
        currentPage: 'home',
        currentAnime: null,
        currentEpisode: 1,
        searchFilter: 'all',
        myList: JSON.parse(localStorage.getItem('myList')) || {},
        continueWatching: JSON.parse(localStorage.getItem('continueWatching')) || {},
        animeCache: {},
    };

    // ==================== API FUNCTIONS ==================== 
    async function fetchAnimeFromAniList(query) {
        const anilistQuery = `
            query($search: String!, $sort: [MediaSort]!) {
                Page(perPage: 12) {
                    media(search: $search, type: ANIME, sort: $sort) {
                        id
                        idMal
                        title {
                            romaji
                            native
                            english
                        }
                        coverImage {
                            large
                        }
                        bannerImage
                        description
                        genres
                        status
                        episodes
                        averageScore
                        studios(isMain: true) {
                            nodes {
                                name
                            }
                        }
                        startDate {
                            year
                        }
                    }
                }
            }
        `;

        try {
            const response = await fetch('https://graphql.anilist.co', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    query: anilistQuery,
                    variables: {
                        search: query,
                        sort: ['POPULARITY_DESC']
                    }
                })
            });

            const data = await response.json();
            return data.data?.Page?.media || [];
        } catch (error) {
            console.error('AniList fetch error:', error);
            return [];
        }
    }

    async function getTrendingAnime() {
        const anilistQuery = `
            query {
                Page(perPage: 10) {
                    media(type: ANIME, sort: TRENDING_DESC, status: RELEASING) {
                        id
                        idMal
                        title {
                            romaji
                            native
                        }
                        coverImage {
                            large
                        }
                        bannerImage
                        description
                        genres
                        status
                        episodes
                        averageScore
                        studios(isMain: true) {
                            nodes {
                                name
                            }
                        }
                        startDate {
                            year
                        }
                    }
                }
            }
        `;

        try {
            const response = await fetch('https://graphql.anilist.co', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query: anilistQuery })
            });

            const data = await response.json();
            return data.data?.Page?.media || [];
        } catch (error) {
            console.error('Trending fetch error:', error);
            return [];
        }
    }

    // ==================== UI FUNCTIONS ==================== 
    function createAnimeCard(anime) {
        const title = anime.title?.romaji || anime.title?.english || 'Unknown';
        const poster = anime.coverImage?.large || 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300"><rect fill="%23222" width="200" height="300"/></svg>';
        const score = anime.averageScore || '—';
        const episodes = anime.episodes || '—';

        return `
            <div class="anime-card" onclick="viewAnimeDetails(${anime.id})">
                <div class="anime-card-image">
                    <img src="${poster}" alt="${title}" loading="lazy">
                    <div class="anime-card-overlay">
                        <h3 class="anime-card-title">${title}</h3>
                        <p class="anime-card-meta">${score}/100 • ${episodes} eps</p>
                        <div class="anime-card-actions">
                            <button class="btn btn-primary btn-sm" onclick="event.stopPropagation(); playAnime(${anime.id})">Play</button>
                            <button class="btn btn-secondary btn-sm" onclick="event.stopPropagation(); addToMyList(${anime.id})">Add</button>
                        </div>
                    </div>
                </div>
            </div>
        `;
    }

    async function renderHome() {
        const trendingAnime = await getTrendingAnime();
        APP.currentAnime = trendingAnime[0];

        if (APP.currentAnime) {
            updateHero(APP.currentAnime);
        }

        const container = document.getElementById('shelvesContainer');
        const shelves = [
            { title: 'Trending Now', anime: trendingAnime.slice(0, 8) },
            { title: 'Airing', anime: trendingAnime.slice(0, 8) },
            { title: 'Top Rated', anime: trendingAnime.slice(0, 8) }
        ];

        container.innerHTML = shelves.map(shelf => `
            <div class="shelf">
                <h2 class="shelf-title">${shelf.title}</h2>
                <div class="shelf-container">
                    ${shelf.anime.map(anime => createAnimeCard(anime)).join('')}
                </div>
            </div>
        `).join('');
    }

    function updateHero(anime) {
        const title = anime.title?.romaji || 'Unknown';
        const desc = anime.description?.replace(/<[^>]*>/g, '') || 'No description available';
        const score = anime.averageScore || '—';
        const episodes = anime.episodes || '—';
        const status = anime.status || '—';
        const studio = anime.studios?.nodes?.[0]?.name || 'Unknown Studio';
        const banner = anime.bannerImage || 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 400"><rect fill="%23111" width="1920" height="400"/></svg>';

        document.getElementById('heroTitle').textContent = title;
        document.getElementById('heroDesc').textContent = desc;
        document.getElementById('heroScore').textContent = score + '/100';
        document.getElementById('heroEpisodes').textContent = episodes;
        document.getElementById('heroStatus').textContent = status;
        document.getElementById('heroStudio').textContent = studio;
        document.getElementById('heroImage').style.backgroundImage = `url('${banner}')`;
    }

    async function viewAnimeDetails(anilistId) {
        try {
            const query = `
                query($id: Int!) {
                    Media(id: $id, type: ANIME) {
                        id
                        title {
                            romaji
                            native
                            english
                        }
                        coverImage { large }
                        bannerImage
                        description
                        genres
                        status
                        episodes
                        averageScore
                        startDate { year }
                        studios(isMain: true) {
                            nodes { name }
                        }
                    }
                }
            `;

            const response = await fetch('https://graphql.anilist.co', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query, variables: { id: anilistId } })
            });

            const data = await response.json();
            const anime = data.data?.Media;

            if (!anime) return;

            APP.currentAnime = anime;

            const title = anime.title?.romaji || 'Unknown';
            const nativeTitle = anime.title?.native || '';
            const desc = anime.description?.replace(/<[^>]*>/g, '') || '';
            const score = anime.averageScore || '—';
            const episodes = anime.episodes || '—';
            const status = anime.status || '—';
            const year = anime.startDate?.year || '—';
            const studio = anime.studios?.nodes?.[0]?.name || 'Unknown';
            const poster = anime.coverImage?.large || '';
            const banner = anime.bannerImage || '';

            document.getElementById('detailsTitle').textContent = title;
            document.getElementById('detailsNativeTitle').textContent = nativeTitle;
            document.getElementById('detailsDesc').textContent = desc;
            document.getElementById('detailsScore').textContent = score + '/100';
            document.getElementById('detailsEpisodes').textContent = episodes;
            document.getElementById('detailsStatus').textContent = status;
            document.getElementById('detailsYear').textContent = year;
            document.getElementById('detailsBanner').src = banner;
            document.getElementById('detailsPoster').src = poster;

            document.getElementById('genresList').innerHTML = (anime.genres || [])
                .map(g => `<div class="genre-badge">${g}</div>`)
                .join('');

            navigatePage('details');
        } catch (error) {
            console.error('Details error:', error);
        }
    }

    async function playAnime(anilistId) {
        try {
            const query = `
                query($id: Int!) {
                    Media(id: $id, type: ANIME) {
                        id
                        title { romaji }
                        episodes
                        description
                    }
                }
            `;

            const response = await fetch('https://graphql.anilist.co', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query, variables: { id: anilistId } })
            });

            const data = await response.json();
            const anime = data.data?.Media;

            if (!anime) return;

            APP.currentAnime = anime;
            APP.currentEpisode = 1;

            const title = anime.title?.romaji || 'Unknown';
            const desc = anime.description?.replace(/<[^>]*>/g, '') || '';

            document.getElementById('playerAnimeTitle').textContent = title;
            document.getElementById('playerEpisodeDesc').textContent = desc;

            // Render episodes
            const episodeSelect = document.getElementById('episodeSelect');
            const episodeGrid = document.getElementById('episodeGrid');
            episodeSelect.innerHTML = '';
            episodeGrid.innerHTML = '';

            for (let i = 1; i <= (anime.episodes || 12); i++) {
                episodeSelect.innerHTML += `<option value="${i}">Episode ${i}</option>`;
                episodeGrid.innerHTML += `
                    <div class="episode-item ${i === 1 ? 'active' : ''}" onclick="playEpisode(${i})">
                        Ep ${i}
                    </div>
                `;
            }

            loadPlayerIframe(anilistId, 1, 'sub');
            navigatePage('player');
        } catch (error) {
            console.error('Play error:', error);
        }
    }

    function loadPlayerIframe(anilistId, episode, type) {
        const url = `https://vidnest.fun/animepahe/${anilistId}/${episode}/${type}`;
        document.getElementById('videoPlayer').src = url;
    }

    function playEpisode(episode) {
        APP.currentEpisode = episode;
        document.getElementById('episodeSelect').value = episode;
        document.querySelectorAll('.episode-item').forEach((el, i) => {
            el.classList.toggle('active', i + 1 === episode);
        });

        const type = document.getElementById('serverSelect').value;
        loadPlayerIframe(APP.currentAnime.id, episode, type);
    }

    function changeEpisode() {
        const episode = document.getElementById('episodeSelect').value;
        if (episode) playEpisode(parseInt(episode));
    }

    function changeServer() {
        playEpisode(APP.currentEpisode);
    }

    function nextEpisode() {
        const maxEp = APP.currentAnime?.episodes || 12;
        if (APP.currentEpisode < maxEp) {
            playEpisode(APP.currentEpisode + 1);
        }
    }

    function previousEpisode() {
        if (APP.currentEpisode > 1) {
            playEpisode(APP.currentEpisode - 1);
        }
    }

    async function searchAnime(query) {
        if (!query.trim()) {
            document.getElementById('searchResults').innerHTML = '';
            return;
        }

        const results = await fetchAnimeFromAniList(query);
        document.getElementById('searchResults').innerHTML = results
            .map(anime => createAnimeCard(anime))
            .join('');
    }

    function filterSearch(filter) {
        APP.searchFilter = filter;
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelector(`[data-filter="${filter}"]`).classList.add('active');
        
        const query = document.getElementById('searchInput').value;
        searchAnime(query);
    }

    function addToMyList(anilistId) {
        const anime = APP.currentAnime;
        if (!anime) return;

        APP.myList[anilistId] = {
            id: anilistId,
            title: anime.title?.romaji || 'Unknown',
            poster: anime.coverImage?.large,
            status: 'watching',
            addedAt: new Date().toISOString()
        };

        localStorage.setItem('myList', JSON.stringify(APP.myList));
    }

    function addToMyList(anilistId) {
        if (!anilistId) anilistId = APP.currentAnime?.id;
        if (!anilistId) return;

        APP.myList[anilistId] = {
            id: anilistId,
            status: 'watching',
            addedAt: new Date().toISOString()
        };

        localStorage.setItem('myList', JSON.stringify(APP.myList));
    }

    function switchListTab(tab) {
        document.querySelectorAll('.list-tab').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');

        const grid = document.getElementById('listGrid');
        const items = Object.entries(APP.myList).filter(([_, anime]) => anime.status === tab);

        if (items.length === 0) {
            grid.innerHTML = `
                <div class="empty-state">
                    <h3>No anime here yet</h3>
                    <p>Add anime to your ${tab} list</p>
                </div>
            `;
            return;
        }

        grid.innerHTML = items.map(([id, anime]) => `
            <div class="anime-card" onclick="viewAnimeDetails(${id})">
                <div class="anime-card-image">
                    <img src="${anime.poster}" alt="${anime.title}" loading="lazy">
                    <div class="anime-card-overlay">
                        <h3 class="anime-card-title">${anime.title}</h3>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function navigatePage(page) {
        document.querySelectorAll('.page-content').forEach(el => el.style.display = 'none');
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));

        const pageMap = {
            'home': 'homePage',
            'search': 'searchPage',
            'details': 'detailsPage',
            'player': 'playerPage',
            'list': 'listPage'
        };

        const pageId = pageMap[page];
        if (pageId) {
            document.getElementById(pageId).style.display = 'block';
        }

        if (page !== 'details' && page !== 'player') {
            document.querySelector(`[onclick="navigatePage('${page}')"]`)?.classList.add('active');
        }

        APP.currentPage = page;
        window.scrollTo(0, 0);
    }

    function playCurrentAnime() {
        if (APP.currentAnime) playAnime(APP.currentAnime.id);
    }

    function playSelectedAnime() {
        if (APP.currentAnime) playAnime(APP.currentAnime.id);
    }

    function addSelectedToList() {
        if (APP.currentAnime) addToMyList(APP.currentAnime.id);
    }

    function viewCurrentDetails() {
        if (APP.currentAnime) viewAnimeDetails(APP.currentAnime.id);
    }

    // ==================== EVENT LISTENERS ==================== 
    document.getElementById('headerSearch').addEventListener('input', (e) => {
        if (APP.currentPage !== 'search') navigatePage('search');
        document.getElementById('searchInput').value = e.target.value;
        searchAnime(e.target.value);
    });

    document.getElementById('searchInput').addEventListener('input', (e) => {
        searchAnime(e.target.value);
    });

    // ==================== INIT ==================== 
    window.addEventListener('load', () => {
        renderHome();
    });
</script>

</body>
</html>
